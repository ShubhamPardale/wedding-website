<!-- Scripts -->
    <script>
      const container = document.querySelector('.petals-container');
      const totalPetals = 20; // number of petals
    
      for (let i = 0; i < totalPetals; i++) {
        const petal = document.createElement('div');
        petal.classList.add('petal');
    
        // Random starting position
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.animationDuration = (5 + Math.random() * 5) + 's'; // random speed
        petal.style.opacity = 0.6 + Math.random() * 0.4; // random opacity
        petal.style.width = petal.style.height = (10 + Math.random() * 10) + 'px';
    
        container.appendChild(petal);
      }
    </script>
